version: '3.9'

services:
  django:
    build:
      context: .
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql
    volumes:
      - mysql_data:/var/lib/mysql
    env_file:
      - db.env
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      timeout: 20s
      retries: 10
      start_period: 10s

volumes:
  mysql_data:
