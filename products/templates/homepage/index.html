{% extends "homepage/base.html" %}
{% load static %}

{% block CSS %}
<style>
	.bgimg {
		width: 100%;
		height: 30rem;
		object-fit: cover;
		object-position: center;
		filter: contrast(0.4) blur(4px) opacity(0.8) brightness(1.2);
	}

	.center {
		position: absolute;
		top: 50%;
		left: 50%;
		transform: translate(-50%, -50%);
	}
</style>
{% endblock CSS %}

{% block content %}
<div class="position-relative overflow-hidden mt-3 p-1 p-md-3 text-center">
	<img class="bgimg" src="{% static 'products/indexBG.jpg' %}" />
	<div class="col-md-8 p-md-5 col-10 center">
		<h1 class="display-4 fw-bold">Beijing Majestic Stationery</h1>
		<p class="lead fw-normal">
			An industrial and commercial company specialized in stationery trading.
		</p>
		<a class="btn btn-info" href="{% url 'products:products' %}" style="color: #fff;">Products</a>
	</div>
	<div class="product-device shadow-sm d-none d-md-block"></div>
	<div class="product-device product-device-2 shadow-sm d-none d-md-block"></div>
</div>
{% endblock content %}
