{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
	<title>Beijing Majestic</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<link rel="icon" type="image/x-icon" href="{% static 'products/icon.ico' %}?v=1" />
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.1/dist/css/bootstrap.min.css" rel="stylesheet"
		integrity="sha384-+0n0xVW2eSR5OomGNYDnhzAbDsOXxcvSN1TPprVMTNDbiYZCxYbOOl7+AMvyTG2x" crossorigin="anonymous" />
	{% block CSS %}{% endblock CSS %}
</head>

<body>
	<nav class="navbar navbar-expand-lg navbar-light"
		style="box-shadow: 0 0.5rem 1rem #4e9098; background-color: #eaf2f8">
		<div class="container-fluid">
			<a class="navbar-brand" href="{% url 'products:index' %}">
				<img src="{% static 'products/logo_transBG.png' %}" height="40" />
			</a>
			<button class="navbar-toggler" type="button" data-bs-toggle="collapse"
				data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
				aria-label="Toggle navigation">
				<span class="navbar-toggler-icon"></span>
			</button>

			<div class="collapse navbar-collapse" id="navbarSupportedContent">
				<div class="navbar-nav me-auto">
					<ul class="navbar-nav me-auto mb-2 mb-lg-0">
						<li class="nav-item fw-bold">
							<a class="nav-link {% if 'product' == page %}active{% endif %}"
								href="{% url 'products:products' %}">Products</a>
						</li>
						<li class="nav-item fw-bold">
							<a class="nav-link {% if 'about' == page %}active{% endif %}"
								href="{% url 'products:about' %}">About</a>
						</li>
						<li class="nav-item fw-bold">
							<a class="nav-link {% if 'contact' == page %}active{% endif %}"
								href="{% url 'contact_us:contact' %}">Contact Us</a>
						</li>
					</ul>
				</div>
			</div>
		</div>
	</nav>
	{% block content %}{% endblock content %}
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.1/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-gtEjrD/SeCtmISkJkNUaaKMoLD0//ElJ19smozuHV6z3Iehds+3Ulb9Bn9Plx0x4" crossorigin="anonymous">
	</script>
</body>

</html>
