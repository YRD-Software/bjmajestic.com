ervices:
  django:
    build:
      context: .
    command: >
      sh -c "python manage.py makemigrations &&
             python manage.py migrate &&
             gunicorn -c gunicorn.conf.py"
    env_file:
      - ./env/.env.dev

  nginx:
    build: ./nginx
    ports:
      - 80:80
      - 443:443
    volumes:
      - nginx_volume:/etc/nginx/conf.d
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/www/certbot:/var/www/certbot
    depends_on:
      - django

volumes:
  nginx_volume:
