{% extends "homepage/base.html" %} {% load static %} {% block content %}

<div class="position-relative">
  <img class="catalog-img-crop" src="{% static 'catalog/catalog-bg.jpg' %}" alt="" />
  <div class="bg-lightblue opacity-75 catalog-img-crop position-absolute top-50 start-50 translate-middle"></div>
  <div class="position-absolute top-50 start-50 translate-middle text-center text-navyblue">
    <h1 class="fw-bold m-3">Catalogs</h1>
    <p>Check out our catalogs from previous years.</p>
  </div>
</div>
<div class="bg-lightblue p-5">
  <div class="container col-10 col-sm-8">
    <div class="row row-cols-1 row-cols-lg-2 row-cols-xxl-3 g-4">
    {% for catalog in catalogs %}
    <div class="col">
      <a href="{{ catalog.file.url }}">
        <div class="card shadow-lg mx-5 border-0">
          <img class="catalog-card-crop card-img" src="{% static 'catalog/pdf.png' %}"
            alt="">
          <div class="card-img-overlay text-center">
            <h1 class="card-title text-navyblue">{{ catalog.year }}</h1>
          </div>
      </a>
      </div>
    </div>
    {% endfor %}
    </div>
  </div>
</div>

{% endblock content %}
