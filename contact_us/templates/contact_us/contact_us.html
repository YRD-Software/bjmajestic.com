{% extends "homepage/base.html" %} {% block content %}
{% load static %}

<!-- Success or Fail message system -->
{% if success %}
<svg xmlns="http://www.w3.org/2000/svg" style="display: none;">
  <symbol id="check-circle-fill" fill="currentColor" viewBox="0 0 16 16">
    <path
      d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zm-3.97-3.03a.75.75 0 0 0-1.08.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-.01-1.05z" />
  </symbol>
  <symbol id="exclamation-triangle-fill" fill="currentColor" viewBox="0 0 16 16">
    <path
      d="M8.982 1.566a1.13 1.13 0 0 0-1.96 0L.165 13.233c-.457.778.091 1.767.98 1.767h13.713c.889 0 1.438-.99.98-1.767L8.982 1.566zM8 5c.535 0 .954.462.9.995l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 5.995A.905.905 0 0 1 8 5zm.002 6a1 1 0 1 1 0 2 1 1 0 0 1 0-2z" />
  </symbol>
</svg>

{% if "Success" in success %}
<div class="alert alert-success d-flex align-items-center m-3 mt-4" role="alert">
  <svg class="bi flex-shrink-0 me-2" width="24" height="24" role="img" aria-label="Warning:">
    <use xlink:href="#check-circle-fill" />
  </svg>
  <div>
    {{ success }}
  </div>
</div>
{% else %}
<div class="alert alert-danger d-flex align-items-center m-3 mt-4" role="alert">
  <svg class="bi flex-shrink-0 me-2" width="24" height="24" role="img" aria-label="Warning:">
    <use xlink:href="#exclamation-triangle-fill" />
  </svg>
  <div>
    {{ success }}
  </div>
</div>
{% endif %}
{% endif %}

<div class="position-relative">
  <img class="contact-img-crop" src="{% static 'contact_us/contact-bg.jpg' %}" alt="">
  <div class="container-fluid bg-lightblue p-5 position-absolute bottom-0 start-50 translate-middle-x">
    <div class="container mb-5">
      <h1 class="fw-bold text-center text-navyblue">Contact Us</h1>
    </div>
    <div class="container col-12 col-md-8 col-xxl-7">
      <form method="post" action="{% url 'contact_us:contact' %}">
        {% csrf_token %}
        <div class="mb-3">
          <input type="email" name="from_email" class="form-control" required id="id_from_email"
            placeholder="Enter your email" aria-describedby="emailHelp" />
          <div id="emailHelp" class="form-text text-navyblue">
            *We'll never share your email with anyone else.
          </div>
        </div>
        <div class="mb-4">
          <input type="text" name="subject" class="form-control" required id="id_subject" placeholder="Subject" />
        </div>
        <div class="mb-3">
          <textarea name="message" class="form-control" require id="id_message" cols="30" rows="10" placeholder="Leave your message here..."></textarea>
        </div>
        <button class="btn btn-bluegrotto" type="submit">Send</button>
      </form>
    </div>
  </div>
</div>
{% endblock content %}
