# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - majestic

on:
  push:
    branches:
      - production
  workflow_dispatch:

jobs:
  build:
    runs-on: 'ubuntu-latest'

    steps:
    - uses: actions/checkout@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v1

    - name: Log in to registry
      uses: docker/login-action@v1
      with:
        registry: https://index.docker.io/v1/
        username: ${{ secrets.AzureAppService_ContainerUsername_95762d381b8b4b5aacad84d6d5d81367 }}
        password: ${{ secrets.AzureAppService_ContainerPassword_926f8394ad674f519a3de0a9b7e5e3bd }}

    - name: Build and push container image to registry
      uses: docker/build-push-action@v2
      with:
        push: true
        tags: index.docker.io/${{ secrets.AzureAppService_ContainerUsername_95762d381b8b4b5aacad84d6d5d81367 }}/majesticweb:${{ github.sha }}
        file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
    - name: Deploy to Azure Web App
      id: deploy-to-webapp
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'majestic'
        slot-name: 'production'
        publish-profile: ${{ secrets.AzureAppService_PublishProfile_23b60fd7544c42d7b99ba5f46f784984 }}
        images: 'index.docker.io/${{ secrets.AzureAppService_ContainerUsername_95762d381b8b4b5aacad84d6d5d81367 }}/majesticweb:${{ github.sha }}'